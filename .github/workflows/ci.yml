name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        # El build NO necesita secretos: los clientes (Supabase/Anthropic) se
        # inicializan de forma perezosa en runtime, no al importar.

  e2e:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    needs: build
    env:
      # Clerk solo se necesita para que `next dev` (webServer de Playwright) ARRANQUE.
      # Los tests E2E solo prueban el sitio público (no rutas de Clerk), así que una
      # publishable key placeholder de formato válido basta. Si agregas los secrets
      # reales (CLERK_PUBLISHABLE_KEY / CLERK_SECRET_KEY en repo Settings → Secrets),
      # se usan en su lugar automáticamente.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsuZXhhbXBsZS5jb20k' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy_ci_secret_for_e2e_only' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
